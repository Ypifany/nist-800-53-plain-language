<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIST SP 800-53 · Plain Language</title>
<style>
  :root{
    --navy:#1A4A6B;
    --navy-dark:#123650;
    --bg:#F7F6F2;
    --console-bg:#1A1A2E;
    --protect-bg:#e2f0e2;
    --protect-text:#2e6b34;
    --protect-border:#a9cfae;
    --detect-bg:#f1e6da;
    --detect-text:#7a4f26;
    --detect-border:#d9bd9a;
    --restore-bg:#ece2f4;
    --restore-text:#6b3f96;
    --restore-border:#cbb3e0;
    --ink:#25313a;
    --muted:#6b7680;
    --line:#e2ded4;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  html,body{overflow-x:hidden;max-width:100%;}
  body{margin:0;font-family:-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);}
  header.topbar{background:var(--navy);color:#fff;padding:22px 28px 18px;}
  header.topbar h1{margin:0;font-size:clamp(17px,4vw,22px);font-weight:600;letter-spacing:.2px;}
  header.topbar p{margin:4px 0 0;font-size:clamp(11px,3vw,13px);color:#cfe0ea;}
  .searchbar{background:var(--navy-dark);padding:14px 28px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;}
  .searchbar input{flex:1 1 260px;min-width:0;max-width:340px;padding:11px 12px;border-radius:5px;border:1px solid #2c5e7d;background:#22587a;color:#eaf2f6;font-size:16px;}
  .searchbar input::placeholder{color:#a9c6d6;}
  .searchbar input:focus{outline:2px solid #7fb8d8;background:#1d4f6c;}
  .searchbar button{padding:11px 16px;border-radius:5px;border:none;background:#fff;color:var(--navy);font-weight:600;font-size:13px;cursor:pointer;flex:0 0 auto;}
  .searchbar button:hover{background:#e6eef2;}
  .searchbar .hint{color:#9fbdcc;font-size:12px;}
  .menu-toggle{display:none;padding:11px 14px;border-radius:5px;border:1px solid #2c5e7d;background:#22587a;color:#eaf2f6;font-weight:600;font-size:13px;cursor:pointer;flex:0 0 auto;}
  .menu-toggle:hover{background:#1d4f6c;}
  .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(15,25,32,.5);z-index:40;}
  .sidebar-backdrop.show{display:block;}
  .layout{display:flex;align-items:flex-start;min-height:calc(100vh - 250px);position:relative;}
  nav.sidebar{width:270px;flex:0 0 270px;background:#fbfaf6;border-right:1px solid var(--line);padding:18px 0 40px;position:sticky;top:0;align-self:flex-start;max-height:100vh;overflow-y:auto;overscroll-behavior:contain;}
  .fam-label{font-size:11px;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;padding:14px 20px 6px;font-weight:600;}
  .ctrl-item{padding:10px 20px;font-size:13.5px;cursor:pointer;color:#2c3e46;border-left:3px solid transparent;line-height:1.35;}
  .ctrl-item b{color:var(--navy);font-weight:700;margin-right:4px;}
  .ctrl-item:hover{background:#eef2ee;}
  .ctrl-item.active{background:#e4edf2;border-left:3px solid var(--navy);font-weight:600;}
  main.content{flex:1;min-width:0;padding:30px 40px 60px;max-width:900px;}
  .ctrl-eyebrow{font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
  .ctrl-title{font-family:Georgia,'Times New Roman',serif;font-size:clamp(21px,5vw,27px);color:var(--navy-dark);margin:4px 0 12px;}
  .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.4px;padding:4px 10px;border-radius:4px;text-transform:uppercase;border:1px solid;}
  .tag-protect{background:var(--protect-bg);color:var(--protect-text);border-color:var(--protect-border);}
  .tag-detect{background:var(--detect-bg);color:var(--detect-text);border-color:var(--detect-border);}
  .tag-restore{background:var(--restore-bg);color:var(--restore-text);border-color:var(--restore-border);}
  .tabs{display:flex;flex-wrap:wrap;gap:2px;margin-top:20px;border-bottom:1px solid var(--line);}
  .tab-btn{background:none;border:none;padding:10px 14px;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
  .tab-btn:hover{color:var(--navy);}
  .tab-btn.active{color:var(--navy);border-bottom:2px solid var(--navy);font-weight:600;}
  .tab-panel{padding:20px 2px 4px;font-size:14.5px;line-height:1.65;display:none;}
  .tab-panel.active{display:block;}
  .tab-panel p{margin:0 0 12px;}
  .tab-panel ul{margin:0 0 4px;padding-left:20px;}
  .tab-panel li{margin-bottom:7px;}
  .console-box{background:var(--console-bg);color:#d8e4e0;border-radius:8px;padding:16px 18px;font-family:"SFMono-Regular",Consolas,"Courier New",monospace;font-size:12.5px;line-height:1.65;overflow-x:auto;white-space:pre;margin-bottom:16px;}
  .console-label{font-size:11px;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin:0 0 6px;font-weight:600;}
  .finding{color:#ff9d8a;}
  .correct{color:#8fd6a8;}
  .enh-section{margin-top:34px;border-top:1px solid var(--line);padding-top:18px;}
  .enh-heading{font-size:13px;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;font-weight:600;}
  .enh-item{border:1px solid var(--line);border-radius:8px;margin-bottom:10px;background:#fff;}
  .enh-head{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:14px;}
  .enh-head b{color:var(--navy-dark);margin-right:8px;}
  .enh-head .chev{color:var(--muted);font-size:12px;}
  .enh-body{display:none;padding:4px 16px 18px;}
  .enh-item.open .enh-body{display:block;}
  .enh-tabs{display:flex;flex-wrap:wrap;gap:2px;border-bottom:1px solid var(--line);margin-bottom:14px;}
  .enh-tab-btn{background:none;border:none;padding:7px 10px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
  .enh-tab-btn.active{color:var(--navy);border-bottom:2px solid var(--navy);font-weight:600;}
  .enh-tab-panel{display:none;font-size:13.5px;line-height:1.6;}
  .enh-tab-panel.active{display:block;}
  footer.sitefooter{background:var(--navy);color:#dfeaf0;font-size:12px;padding:16px 28px;text-align:center;}
  footer.sitefooter a{color:#9fd0ef;text-decoration:none;}
  footer.sitefooter a:hover{text-decoration:underline;}
  .empty-state{color:var(--muted);font-size:14px;padding:40px 0;}
  @media (max-width:900px){
    .menu-toggle{display:inline-block;}
    .searchbar .hint{display:none;}
    .layout{display:block;}
    nav.sidebar{
      position:fixed;top:0;left:0;bottom:0;height:100%;
      width:min(85vw,320px);flex:none;
      transform:translateX(-100%);
      transition:transform .25s ease;
      z-index:50;box-shadow:2px 0 18px rgba(0,0,0,.25);
      border-right:none;
    }
    nav.sidebar.open{transform:translateX(0);}
    main.content{padding:22px 18px 50px;max-width:100%;}
    .ctrl-title{line-height:1.25;}
  }
  @media (max-width:480px){
    header.topbar{padding:16px 16px 14px;}
    .searchbar{padding:12px 16px;}
    main.content{padding:18px 14px 44px;}
    .console-box{font-size:11.5px;padding:12px 14px;}
    .tab-btn{padding:9px 10px;font-size:12px;}
    .ctrl-item{padding:11px 18px;font-size:14px;}
  }
</style>
</head>
<body>

<header class="topbar">
  <h1>NIST SP 800-53 · Plain Language</h1>
  <p>All 20 Control Families · NIST SP 800-53B Moderate Baseline</p>
</header>

<div class="searchbar">
  <button class="menu-toggle" id="menuToggle">☰ Browse Controls</button>
  <input id="searchInput" type="text" placeholder="Type a control number (e.g. AC-2, AU-6, AC-6(1))">
  <button id="searchBtn">Look up</button>
  <span class="hint">or browse the list</span>
</div>

<div class="layout">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="content">
    <div class="empty-state">Choose a control from the list, or search for a control number, to get started.</div>
  </main>
</div>

<footer class="sitefooter">

</footer>

<script>
const TAGCLASS = { Protect: 'tag-protect', Detect: 'tag-detect', Restore: 'tag-restore' };

const FAMILIES = [
{
  code:'AC', name:'Access Control',
  controls:[
    {
      id:'AC-1', title:'Access Control Policy and Procedures', tag:'Protect',
      doesText:'Establishes the written policy and procedures that every other AC control depends on. Without AC-1, there is nothing to enforce.',
      plain:'Before anyone can control who gets in, the organization has to write its rules down, formally. AC-1 says put your access control decisions in writing, assign someone to own those decisions, and keep the document current. It is the foundation that makes all the other AC controls mean something.',
      analog:'Think of the house rules a family posts on the fridge: who is allowed to use the car, when the Wi-Fi password changes, who can let a guest inside. Nothing else works until those rules exist in writing and someone is responsible for updating them.',
      lives:['System security plans and policy repositories','Governance, risk, and compliance platforms','New administrator onboarding packets','Annual policy review and sign-off workflows'],
      look:['A dated, approved access control policy with a named owner','Procedures describing how the policy is actually carried out','A review cycle, usually annual, with visible revision history','Staff who can explain the policy in their own words'],
      consoleLinux:`$ ls -l /opt/policies/access-control/
-rw-r--r-- 1 issm issm 482913 Jun 02 09:14 AC-1_Access_Control_Policy_v3.2.pdf   <span class="correct">← correct</span>
$ stat -c '%y' /opt/policies/access-control/AC-1_Access_Control_Policy_v3.2.pdf
2026-06-02 09:14:11.000000000 -0400                                            <span class="correct">← correct, reviewed within 12 months</span>

$ ls -l /opt/policies/access-control/
-rw-r--r-- 1 issm issm 201044 Mar 14 2021 AC-1_Access_Control_Policy_v1.0.pdf  <span class="finding">← FINDING, no review since 2021</span>`,
      consoleWin:`PS> Get-Item "T:/policies/AC-1_Access_Control_Policy.docx" | Select LastWriteTime

LastWriteTime
-------------
6/2/2026 9:14:11 AM                                                            <span class="correct">← correct</span>

PS> Get-Item "T:/policies/AC-1_Access_Control_Policy.docx" | Select LastWriteTime
LastWriteTime
-------------
3/14/2021 8:02:00 AM                                                           <span class="finding">← FINDING, five years stale</span>`,
      enh:[]
    },
    {
      id:'AC-2', title:'Account Management', tag:'Protect',
      doesText:'Governs the full lifecycle of an account: who can request one, how it gets approved, and when it gets disabled or removed.',
      plain:'AC-2 covers the entire life of an account, from the day it is created to the day it is disabled. It requires a defined process for approving, reviewing, and removing accounts, and it requires someone to actually be watching the account list rather than letting it grow forever.',
      analog:'It is the difference between a gym that issues a keycard, tracks who has one, and deactivates it the day a membership ends, versus a gym that hands out keys and never asks for them back.',
      lives:['Active Directory, LDAP, and cloud identity providers','Application-level user tables and service account registries','HR-to-IT provisioning and deprovisioning workflows','Periodic account recertification campaigns'],
      look:['A current list of authorized account types (user, admin, service, guest)','Evidence that terminated employees lose access the same day, not weeks later','Account creation tickets tied to an approval, not self-service without review','A recertification report signed by account owners'],
      consoleLinux:`$ awk -F: '$3 >= 1000 {print $1, $3}' /etc/passwd
jsmith 1001
svc_backup 1002
tmoore 1003                                                                    <span class="correct">← correct, matches active roster</span>

$ lastlog -u ghopper
Username    Port   From         Latest
ghopper     tty1                Never logged in                                <span class="finding">← FINDING, account exists but employee left in 2024</span>`,
      consoleWin:`PS> Get-ADUser -Filter {Enabled -eq $true} | Select SamAccountName,LastLogonDate

SamAccountName   LastLogonDate
--------------   -------------
jsmith           7/1/2026 8:14 AM                                              <span class="correct">← correct</span>
ghopper          11/3/2024 4:02 PM                                             <span class="finding">← FINDING, enabled 20 months after separation</span>`,
      enh:[
        {id:'AC-2(1)', title:'Automated System Account Management', tag:'Protect',
         doesText:'Requires the account lifecycle to be managed by tooling instead of a spreadsheet or a memory.',
         plain:'Instead of a person manually creating and deleting accounts, an automated system handles it, tied to HR data or a ticketing system, so accounts do not linger because someone forgot.',
         analog:'Like a hotel key system that automatically deactivates a room key at checkout time, rather than relying on staff to remember to disable it.',
         lives:['Identity governance and administration (IGA) platforms','HR system integrations that trigger provisioning events','SCIM-based account sync between directories and SaaS apps'],
         look:['An IGA tool actively managing account creation and removal','Automated tickets generated on hire, transfer, and termination events','No accounts created through an undocumented manual side channel'],
         consoleLinux:`$ systemctl status sssd
● sssd.service - System Security Services Daemon
   Active: active (running) since Mon 2026-07-06 03:00:12 EDT                 <span class="correct">← correct, automated identity sync running</span>`,
         consoleWin:`PS> Get-ADSyncScheduler | Select-Object SyncCycleEnabled,NextSyncCycleStartTimeInUTC

SyncCycleEnabled  NextSyncCycleStartTimeInUTC
----------------  ---------------------------
True              7/6/2026 3:30:00 PM                                         <span class="correct">← correct, HR-driven sync active</span>`},
        {id:'AC-2(2)', title:'Automated Temporary and Emergency Account Management', tag:'Protect',
         doesText:'Ensures temporary and emergency accounts expire automatically instead of being disabled manually, or forgotten.',
         plain:'Emergency and temporary accounts, the kind created during an incident or for a short-term contractor, are set with a built-in expiration so they cannot outlive their purpose.',
         analog:'Like a visitor badge that stops working at 5 p.m. automatically, instead of relying on the front desk to collect it.',
         lives:['Break-glass and emergency access accounts','Contractor and vendor temporary accounts','Incident response jump-box credentials'],
         look:['An expiration date set at account creation, not added later','A report of temporary accounts with automatic disable dates','No temporary account older than its defined window'],
         consoleLinux:`$ chage -l contractor_temp
Account expires : Jul 20, 2026                                                <span class="correct">← correct, expiration set</span>

$ chage -l contractor_old
Account expires : never                                                      <span class="finding">← FINDING, temp account with no expiration</span>`,
         consoleWin:`PS> Get-ADUser contractor_temp -Properties AccountExpirationDate | Select AccountExpirationDate
AccountExpirationDate
----------------------
7/20/2026 12:00:00 AM                                                         <span class="correct">← correct</span>`},
        {id:'AC-2(3)', title:'Disable Accounts', tag:'Protect',
         doesText:'Requires accounts to be disabled within an organization-defined time after they are no longer needed.',
         plain:'When someone leaves, changes roles, or an account is flagged as no longer necessary, this enhancement requires it to be disabled quickly, usually within a day, not left active out of convenience.',
         analog:'Like cancelling a subscription the day you decide to stop, instead of letting it auto-renew for six more months.',
         lives:['Offboarding and role-transfer workflows','Dormant account detection routines','Contractor end-of-engagement processes'],
         look:['A documented maximum time-to-disable after separation','Reports showing zero accounts active past that window','Disable actions logged and tied to an HR or ticket event'],
         consoleLinux:`$ passwd -S rjenkins
rjenkins L 07/06/2026 0 99999 7 -                                             <span class="correct">← correct, account Locked same day as separation</span>

$ passwd -S dcarver
dcarver P 06/01/2026 0 99999 7 -                                              <span class="finding">← FINDING, separated employee's account still Active</span>`,
         consoleWin:`PS> Get-ADUser dcarver -Properties Enabled | Select Enabled
Enabled
-------
True                                                                          <span class="finding">← FINDING, should be False since separation date</span>`},
        {id:'AC-2(4)', title:'Automated Audit Actions', tag:'Detect',
         doesText:'Requires account creation, modification, disabling, and removal actions to be logged automatically.',
         plain:'Every time an account is created, changed, or removed, that action gets logged automatically, so there is a record of who made the change and when.',
         analog:'Like a bank automatically emailing you every time someone adds a new authorized user to your account.',
         lives:['Directory service audit logs','SIEM correlation rules for account lifecycle events','Change management tickets linked to log entries'],
         look:['Account changes appearing in the audit log without manual entry','Alerts firing on privileged account creation','No gap between an account change and its logged event'],
         consoleLinux:`$ ausearch -m USER_ACCT -ts today
type=USER_ACCT msg=audit(1751800000.123): user pid=1932 uid=0 auid=1001 acct="newhire" op=add-user res=success  <span class="correct">← correct, logged</span>`,
         consoleWin:`PS> Get-WinEvent -FilterHashtable @{LogName='Security';Id=4720} -MaxEvents 3
TimeCreated          Id    Message
-----------          --    -------
7/6/2026 9:02:11 AM  4720  A user account was created: newhire               <span class="correct">← correct</span>`},
        {id:'AC-2(5)', title:'Inactivity Logout', tag:'Protect',
         doesText:'Requires users to log out completely, not just lock the screen, after a defined period of inactivity or at the end of a session.',
         plain:'Beyond a screen lock, this enhancement requires users to actually log out of the system after inactivity or a normal work period ends, closing the session rather than leaving it suspended.',
         analog:'Like a shared library computer that signs a patron out entirely after fifteen idle minutes, instead of just dimming the screen.',
         lives:['Session and application logout policies','Shared workstation and kiosk configurations'],
         look:['A defined logout requirement enforced at the application or OS level, not left to user habit','Sessions actually terminating, not merely locking, tested directly'],
         consoleLinux:`$ grep TMOUT /etc/profile.d/timeout.sh
TMOUT=900; readonly TMOUT; export TMOUT                                     <span class="correct">← correct, shell session force-logs-out after 15 idle minutes</span>`,
         consoleWin:`PS> (Get-ItemProperty "HKLM:\\SOFTWARE\\Policies\\Microsoft\\Windows\\Control Panel\\Desktop").InactivityTimeoutSecs
900                                                                          <span class="correct">← correct</span>`},
        {id:'AC-2(13)', title:'Disable Accounts for High-Risk Individuals', tag:'Protect',
         doesText:'Requires the ability to disable an account immediately when a user is identified as a significant security risk.',
         plain:'When someone is flagged as a serious, immediate risk, under investigation, terminated for cause, showing clear signs of compromise, the organization has to be able to disable that account right away, not wait for the normal offboarding cycle.',
         analog:'Like a store manager pulling an employee\'s register access the moment theft is suspected, rather than waiting for the next scheduled review.',
         lives:['Insider threat and HR-triggered emergency disable procedures','Security incident account suspension workflows'],
         look:['A documented emergency disable procedure, separate from routine offboarding','Evidence that a flagged account can be disabled within minutes, not days, tested directly'],
         consoleLinux:`$ usermod -L -e 1 flagged_user
$ passwd -S flagged_user
flagged_user L 07/06/2026 0 99999 7 -                                        <span class="correct">← correct, disabled immediately on flag</span>`,
         consoleWin:`PS> Disable-ADAccount -Identity flagged_user
PS> Get-ADUser flagged_user -Properties Enabled | Select Enabled
Enabled
-------
False                                                                        <span class="correct">← correct</span>`}
      ]
    },
    {
      id:'AC-3', title:'Access Enforcement', tag:'Protect',
      doesText:'Makes sure the system actually enforces the access rules the policy describes, at the point where a user tries to touch a resource.',
      plain:'AC-3 is where the policy becomes real. It requires the system to check permissions every time someone tries to read, write, or run something, and to block the action if the person is not authorized, no exceptions granted by habit.',
      analog:'Like a locked door that checks your keycard every single time, rather than staying propped open because everyone who walks by "usually" belongs there.',
      lives:['File system permissions and access control lists','Database role-based access controls','Application authorization middleware and API gateways'],
      look:['Permissions that match the access control policy, not looser defaults','Denied-access attempts actually being denied, tested and confirmed','No shared "everyone" or "Everyone: Full Control" grants on sensitive resources'],
      consoleLinux:`$ ls -ld /var/data/finance
drwxr-x--- 2 finance finance 4096 Jul 1 10:02 /var/data/finance             <span class="correct">← correct, restricted to the finance group</span>

$ ls -ld /var/data/hr
drwxrwxrwx 2 hr hr 4096 Jul 1 10:02 /var/data/hr                             <span class="finding">← FINDING, world-writable HR data</span>`,
      consoleWin:`PS> Get-Acl "D:/Shares/Finance" | Format-List
Access : FINANCE\\Finance-Team Allow  Modify                                 <span class="correct">← correct</span>

PS> Get-Acl "D:/Shares/HR" | Format-List
Access : Everyone Allow  FullControl                                         <span class="finding">← FINDING, Everyone has full control of HR share</span>`,
      enh:[]
    },
    {
      id:'AC-4', title:'Information Flow Enforcement', tag:'Protect',
      doesText:'Controls where data is allowed to move, between systems, networks, and security domains, not just who can touch it.',
      plain:'This control is about the path data takes, not just who is allowed to see it. It stops information from moving from a high-security zone into a lower one, or between systems that are not supposed to talk to each other, even if the individual has valid credentials on both sides.',
      analog:'Like a mail sorting facility that physically cannot route a classified diplomatic pouch onto the regular postal truck, no matter who is handling it.',
      lives:['Network segmentation boundaries and firewalls','Data loss prevention (DLP) rules at egress points','Cross-domain solutions between classification levels'],
      look:['Firewall rules that deny traffic between zones by default','DLP alerts for data leaving its authorized boundary','Documented data flow diagrams that match actual configured rules'],
      consoleLinux:`$ iptables -L FORWARD -v -n | grep -i drop
DROP  all  --  10.10.20.0/24  10.10.10.0/24                                  <span class="correct">← correct, dev zone blocked from prod zone</span>

$ iptables -L FORWARD -v -n | grep ACCEPT
ACCEPT all  --  10.10.20.0/24  10.10.10.0/24                                 <span class="finding">← FINDING, unrestricted path from dev into prod</span>`,
      consoleWin:`PS> Get-NetFirewallRule -DisplayName "Block-DevToProd" | Select Enabled,Action
Enabled  Action
-------  ------
True     Block                                                              <span class="correct">← correct</span>`,
      enh:[]
    },
    {
      id:'AC-5', title:'Separation of Duties', tag:'Protect',
      doesText:'Splits sensitive tasks across more than one person, so no single individual can complete a harmful action alone.',
      plain:'AC-5 requires that critical functions, like approving a payment and issuing it, or writing code and deploying it to production, are split between different people. This is not about distrust, it is about removing the opportunity for a single person, malicious or mistaken, to cause damage unchecked.',
      analog:'Like the two-key system for a bank safety deposit box: the bank has one key, you have the other, and neither alone can open it.',
      lives:['Financial approval workflows (initiator vs. approver)','Code deployment pipelines (developer vs. release manager)','System administration vs. security auditing roles'],
      look:['A documented separation-of-duties matrix for sensitive functions','No single account with both requester and approver rights on the same transaction','Deployment access separate from code-authoring access'],
      consoleLinux:`$ groups jdev
jdev : jdev developers                                                      <span class="correct">← correct, no deploy group membership</span>

$ groups jdev
jdev : jdev developers prod_deployers                                       <span class="finding">← FINDING, developer also holds production deploy rights</span>`,
      consoleWin:`PS> Get-ADUser jdev -Properties MemberOf | Select -Expand MemberOf
CN=Developers,OU=Groups,DC=corp
CN=ProdDeployers,OU=Groups,DC=corp                                          <span class="finding">← FINDING, same conflict on Windows side</span>`,
      enh:[]
    },
    {
      id:'AC-6', title:'Least Privilege', tag:'Protect',
      doesText:'Requires every account and process to hold only the access it needs to do its job, and nothing more.',
      plain:'Least privilege means giving people and systems the smallest set of permissions that lets them do their actual work. Not "just in case" access, not leftover access from a role they used to have, only what the current job requires.',
      analog:'Like a hotel housekeeper\'s master key that opens guest rooms on their assigned floor, but not the manager\'s office, the cash room, or the roof.',
      lives:['Role-based access control (RBAC) assignments','Sudoers and administrative group memberships','Cloud IAM policies and scoped service roles'],
      look:['Role definitions that map to actual job duties, reviewed periodically','No standing admin rights for tasks performed a few times a year','Evidence of access being removed after a role change, not just added'],
      consoleLinux:`$ sudo -l -U jhelpdesk

function renderSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  FAMILIES.forEach(fam=>{
    const label = document.createElement('div');
    label.className = 'fam-label';
    label.textContent = fam.code + ' · ' + fam.name.toUpperCase();
    sb.appendChild(label);
    fam.controls.forEach(c=>{
      const item = document.createElement('div');
      item.className = 'ctrl-item';
      item.dataset.id = c.id;
      item.innerHTML = '<b>'+c.id+'</b>'+c.title;
      item.addEventListener('click', ()=>selectControl(c.id));
      sb.appendChild(item);
    });
  });
}

function findControl(id){
  const norm = id.trim().toUpperCase();
  for(const fam of FAMILIES){
    for(const c of fam.controls){
      if(c.id === norm) return {control:c, enhId:null};
      for(const e of c.enh){
        if(e.id.toUpperCase() === norm) return {control:c, enhId:e.id};
      }
    }
  }
  return null;
}

function tabButtons(prefix){
  return [
    ['plain','📖','Plain Language'],
    ['does','⚙️','What It Does'],
    ['analog','🏠','Everyday Analog'],
    ['lives','📍','Where This Lives'],
    ['look','✓','Look For'],
    ['console','⌨️','Console / STIG']
  ];
}

function panelHTML(c){
  const tabs = tabButtons();
  let html = '<div class="tabs">';
  tabs.forEach((t,i)=>{
    html += `<button class="tab-btn${i===0?' active':''}" data-tab="${t[0]}">${t[1]} ${t[2]}</button>`;
  });
  html += '</div>';

  html += `<div class="tab-panel active" data-panel="plain"><p>${c.plain}</p></div>`;
  html += `<div class="tab-panel" data-panel="does"><p><span class="tag ${TAGCLASS[c.tag]}">${c.tag}</span></p><p>${c.doesText}</p></div>`;
  html += `<div class="tab-panel" data-panel="analog"><p>${c.analog}</p></div>`;
  html += `<div class="tab-panel" data-panel="lives"><ul>${c.lives.map(l=>'<li>'+l+'</li>').join('')}</ul></div>`;
  html += `<div class="tab-panel" data-panel="look"><ul>${c.look.map(l=>'<li>'+l+'</li>').join('')}</ul></div>`;
  html += `<div class="tab-panel" data-panel="console">
      <p class="console-label">Linux</p>
      <div class="console-box">${c.consoleLinux}</div>
      ${c.consoleWin ? '<p class="console-label">Windows</p><div class="console-box">'+c.consoleWin+'</div>' : ''}
    </div>`;
  return html;
}

function enhPanelHTML(e){
  const tabs = tabButtons();
  let html = '<div class="enh-tabs">';
  tabs.forEach((t,i)=>{
    html += `<button class="enh-tab-btn${i===0?' active':''}" data-tab="${t[0]}">${t[1]} ${t[2]}</button>`;
  });
  html += '</div>';
  html += `<div class="enh-tab-panel active" data-panel="plain"><p>${e.plain}</p></div>`;
  html += `<div class="enh-tab-panel" data-panel="does"><p><span class="tag ${TAGCLASS[e.tag]}">${e.tag}</span></p><p>${e.doesText}</p></div>`;
  html += `<div class="enh-tab-panel" data-panel="analog"><p>${e.analog}</p></div>`;
  html += `<div class="enh-tab-panel" data-panel="lives"><ul>${e.lives.map(l=>'<li>'+l+'</li>').join('')}</ul></div>`;
  html += `<div class="enh-tab-panel" data-panel="look"><ul>${e.look.map(l=>'<li>'+l+'</li>').join('')}</ul></div>`;
  html += `<div class="enh-tab-panel" data-panel="console">
      <p class="console-label">Linux</p>
      <div class="console-box">${e.consoleLinux}</div>
      ${e.consoleWin ? '<p class="console-label">Windows</p><div class="console-box">'+e.consoleWin+'</div>' : ''}
    </div>`;
  return html;
}

function selectControl(id, enhToOpen){
  const found = findControl(id);
  const content = document.getElementById('content');
  if(!found){
    content.innerHTML = '<div class="empty-state">No control found matching "'+id+'". Try a format like AC-2 or AC-6(1).</div>';
    return;
  }
  const c = found.control;

  document.querySelectorAll('.ctrl-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.id === c.id);
  });

  let html = `<div class="ctrl-eyebrow">${c.id}</div>
    <h2 class="ctrl-title">${c.title}</h2>
    <span class="tag ${TAGCLASS[c.tag]}">${c.tag}</span>
    ${panelHTML(c)}`;

  if(c.enh && c.enh.length){
    html += `<div class="enh-section"><div class="enh-heading">Enhancements</div>`;
    c.enh.forEach(e=>{
      html += `<div class="enh-item" data-enh-id="${e.id}">
        <div class="enh-head"><span><b>${e.id}</b>${e.title}</span><span class="chev">▸ expand</span></div>
        <div class="enh-body">${enhPanelHTML(e)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  content.innerHTML = html;
  wireTabs(content);
  wireEnhancements(content);

  if(enhToOpen || (found.enhId)){
    const targetId = enhToOpen || found.enhId;
    const enhEl = content.querySelector(`.enh-item[data-enh-id="${targetId}"]`);
    if(enhEl){
      enhEl.classList.add('open');
      enhEl.querySelector('.chev').textContent = '▾ collapse';
      enhEl.scrollIntoView({behavior:'smooth', block:'center'});
    }
  }

  // On phones and tablets the sidebar is an overlay drawer. Once a control
  // is picked, close the drawer and jump straight to the content instead of
  // leaving the visitor to scroll past the full control list.
  closeSidebar();
  if(window.innerWidth <= 900){
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarBackdrop').classList.add('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('show');
}
function toggleSidebar(){
  const sb = document.getElementById('sidebar');
  if(sb.classList.contains('open')) closeSidebar(); else openSidebar();
}

function wireTabs(scope){
  const tabBtns = scope.querySelectorAll('.tabs .tab-btn');
  const panels = scope.querySelectorAll(':scope > .tab-panel, .tab-panel');
  tabBtns.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const group = btn.closest('.tabs').parentElement;
      group.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      group.querySelectorAll('.tab-panel').forEach(p=>{
        p.classList.toggle('active', p.dataset.panel === btn.dataset.tab);
      });
    });
  });
}

function wireEnhancements(scope){
  scope.querySelectorAll('.enh-item').forEach(item=>{
    const head = item.querySelector('.enh-head');
    head.addEventListener('click', ()=>{
      const isOpen = item.classList.toggle('open');
      item.querySelector('.chev').textContent = isOpen ? '▾ collapse' : '▸ expand';
    });
    const tabBtns = item.querySelectorAll('.enh-tab-btn');
    tabBtns.forEach(btn=>{
      btn.addEventListener('click', (ev)=>{
        ev.stopPropagation();
        const group = btn.closest('.enh-body');
        group.querySelectorAll('.enh-tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        group.querySelectorAll('.enh-tab-panel').forEach(p=>{
          p.classList.toggle('active', p.dataset.panel === btn.dataset.tab);
        });
      });
    });
  });
}

function doSearch(){
  const val = document.getElementById('searchInput').value;
  if(!val.trim()) return;
  selectControl(val);
}

document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') doSearch();
});
document.getElementById('menuToggle').addEventListener('click', toggleSidebar);
document.getElementById('sidebarBackdrop').addEventListener('click', closeSidebar);
document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape') closeSidebar();
});
window.addEventListener('resize', ()=>{
  if(window.innerWidth > 900) closeSidebar();
});

renderSidebar();
</script>
</body>
